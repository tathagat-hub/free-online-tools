<!DOCTYPE html>
<html>
<head>

<title>Free Online Tools</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:30px;
}

h1{
color:#333;
}

.container{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin:20px auto;
max-width:600px;
}

button{
padding:10px 20px;
border:none;
background:#4CAF50;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

canvas{
max-width:100%;
margin-top:15px;
}

textarea{
width:90%;
height:120px;
}

</style>

</head>

<body>

<h1>Free Online Tools</h1>

<!-- Image Compressor -->

<div class="container">

<h2>Image Compressor</h2>

<input type="file" id="upload" accept="image/*">

<br><br>

<canvas id="canvas"></canvas>

<br><br>

<button onclick="download()">Download Compressed Image</button>

</div>

<!-- Word Counter -->

<div class="container">

<h2>Word Counter</h2>

<textarea id="text"></textarea>

<br><br>

<button onclick="countWords()">Count Words</button>

<p id="wordresult"></p>

</div>

<!-- Text Case Converter -->

<div class="container">

<h2>Text Case Converter</h2>

<textarea id="caseText"></textarea>

<br><br>

<button onclick="toUpper()">UPPERCASE</button>

<button onclick="toLower()">lowercase</button>

</div>

<script>

// Image Compressor

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

document.getElementById("upload").addEventListener("change",function(e){

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(event){

let img=new Image()

img.onload=function(){

canvas.width=img.width*0.6
canvas.height=img.height*0.6

ctx.drawImage(img,0,0,canvas.width,canvas.height)

}

img.src=event.target.result

}

reader.readAsDataURL(file)

})

function download(){

let link=document.createElement("a")

link.download="compressed-image.jpg"

link.href=canvas.toDataURL("image/jpeg",0.6)

link.click()

}

// Word Counter

function countWords(){

let text=document.getElementById("text").value

let words=text.trim().split(/\s+/).length

document.getElementById("wordresult").innerText="Words: "+words

}

// Case Converter

function toUpper(){

let text=document.getElementById("caseText")

text.value=text.value.toUpperCase()

}

function toLower(){

let text=document.getElementById("caseText")

text.value=text.value.toLowerCase()

}

</script>

</body>
</html>
