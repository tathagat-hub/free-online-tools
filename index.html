<!DOCTYPE html>
<html>
<head>

<title>Free Online Tools</title>

<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1">

</head>

<body>

<header>

<h1>Free Online Tools</h1>

<p>Simple tools for everyday tasks</p>

</header>

<div class="search">

<input type="text" id="search" placeholder="Search tools..." onkeyup="searchTools()">

</div>

<div class="grid" id="tools">

<div class="card" onclick="openTool('word')">Word Counter</div>
<div class="card" onclick="openTool('case')">Case Converter</div>
<div class="card" onclick="openTool('password')">Password Generator</div>
<div class="card" onclick="openTool('qr')">QR Generator</div>
<div class="card" onclick="openTool('bmi')">BMI Calculator</div>
<div class="card" onclick="openTool('age')">Age Calculator</div>
<div class="card" onclick="openTool('tip')">Tip Calculator</div>
<div class="card" onclick="openTool('random')">Random Number</div>
<div class="card" onclick="openTool('reverse')">Reverse Text</div>
<div class="card" onclick="openTool('uuid')">UUID Generator</div>
<div class="card" onclick="openTool('temp')">Temperature Converter</div>
<div class="card" onclick="openTool('lorem')">Lorem Generator</div>

</div>

<div id="toolarea"></div>

<script src="script.js"></script>

</body>
</html>
