<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Free Online Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#1a73e8;
color:white;
padding:20px;
overflow:auto;
}

.sidebar h2{
margin-top:0;
}

.sidebar button{
display:block;
width:100%;
margin:6px 0;
padding:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
cursor:pointer;
border-radius:4px;
}

.sidebar button:hover{
background:rgba(255,255,255,0.25);
}

/* MAIN AREA */

.main{
flex:1;
padding:30px;
overflow:auto;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.search{
padding:10px;
width:260px;
border:1px solid #ddd;
border-radius:6px;
}

.toolbox{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button.action{
background:#1a73e8;
color:white;
padding:10px 18px;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

textarea,input{
width:100%;
padding:10px;
margin:6px 0;
border:1px solid #ddd;
border-radius:5px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Tools</h2>

<button onclick="openTool('word')">Word Counter</button>
<button onclick="openTool('case')">Case Converter</button>
<button onclick="openTool('password')">Password Generator</button>
<button onclick="openTool('qr')">QR Generator</button>
<button onclick="openTool('reverse')">Reverse Text</button>
<button onclick="openTool('random')">Random Number</button>
<button onclick="openTool('bmi')">BMI Calculator</button>
<button onclick="openTool('age')">Age Calculator</button>
<button onclick="openTool('tip')">Tip Calculator</button>
<button onclick="openTool('uuid')">UUID Generator</button>
<button onclick="openTool('temp')">Temperature Converter</button>
<button onclick="openTool('lorem')">Lorem Generator</button>

</div>

<!-- MAIN -->

<div class="main">

<header>

<h1>Free Online Tools</h1>

<input class="search" placeholder="Search tools..." onkeyup="searchTool(this.value)">

</header>

<div class="toolbox" id="toolbox">

<h2>Welcome</h2>

<p>Select a tool from the left menu.</p>

</div>

</div>

<script>

/* SEARCH TOOL */

function searchTool(q){

q=q.toLowerCase()

let buttons=document.querySelectorAll(".sidebar button")

buttons.forEach(btn=>{

btn.style.display=btn.innerText.toLowerCase().includes(q)?"block":"none"

})

}

/* OPEN TOOL */

function openTool(tool){

let html=""

if(tool=="word"){

html=`

<h2>Word Counter</h2>

<textarea id="text"></textarea>

<button class="action" onclick="countWords()">Count</button>

<p id="result"></p>

`

}

if(tool=="case"){

html=`

<h2>Case Converter</h2>

<textarea id="text"></textarea>

<button class="action" onclick="toUpper()">UPPERCASE</button>

<button class="action" onclick="toLower()">lowercase</button>

`

}

if(tool=="password"){

html=`

<h2>Password Generator</h2>

<button class="action" onclick="generatePassword()">Generate</button>

<p id="result"></p>

`

}

if(tool=="qr"){

html=`

<h2>QR Generator</h2>

<input id="qrtext" placeholder="Enter text">

<button class="action" onclick="generateQR()">Generate</button>

<br><br>

<img id="qrimg">

`

}

if(tool=="reverse"){

html=`

<h2>Reverse Text</h2>

<input id="text">

<button class="action" onclick="reverseText()">Reverse</button>

<p id="result"></p>

`

}

if(tool=="random"){

html=`

<h2>Random Number</h2>

<button class="action" onclick="randomNumber()">Generate</button>

<p id="result"></p>

`

}

if(tool=="bmi"){

html=`

<h2>BMI Calculator</h2>

<input id="weight" placeholder="Weight kg">

<input id="height" placeholder="Height cm">

<button class="action" onclick="calcBMI()">Calculate</button>

<p id="result"></p>

`

}

if(tool=="age"){

html=`

<h2>Age Calculator</h2>

<input type="date" id="birth">

<button class="action" onclick="calcAge()">Calculate</button>

<p id="result"></p>

`

}

if(tool=="tip"){

html=`

<h2>Tip Calculator</h2>

<input id="bill" placeholder="Bill amount">

<input id="tip" placeholder="Tip %">

<button class="action" onclick="calcTip()">Calculate</button>

<p id="result"></p>

`

}

if(tool=="uuid"){

html=`

<h2>UUID Generator</h2>

<button class="action" onclick="genUUID()">Generate</button>

<p id="result"></p>

`

}

if(tool=="temp"){

html=`

<h2>Temperature Converter</h2>

<input id="celsius" placeholder="Celsius">

<button class="action" onclick="convertTemp()">Convert</button>

<p id="result"></p>

`

}

if(tool=="lorem"){

html=`

<h2>Lorem Ipsum Generator</h2>

<button class="action" onclick="genLorem()">Generate</button>

<p id="result"></p>

`

}

document.getElementById("toolbox").innerHTML=html

}

/* FUNCTIONS */

function countWords(){

let t=document.getElementById("text").value

document.getElementById("result").innerText="Words: "+t.trim().split(/\s+/).length

}

function toUpper(){

let t=document.getElementById("text")

t.value=t.value.toUpperCase()

}

function toLower(){

let t=document.getElementById("text")

t.value=t.value.toLowerCase()

}

function generatePassword(){

let c="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"

let p=""

for(let i=0;i<12;i++) p+=c[Math.floor(Math.random()*c.length)]

document.getElementById("result").innerText=p

}

function randomNumber(){

document.getElementById("result").innerText=Math.floor(Math.random()*1000)

}

function reverseText(){

let t=document.getElementById("text").value

document.getElementById("result").innerText=t.split("").reverse().join("")

}

function generateQR(){

let t=document.getElementById("qrtext").value

document.getElementById("qrimg").src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+t

}

function calcBMI(){

let w=document.getElementById("weight").value

let h=document.getElementById("height").value/100

document.getElementById("result").innerText="BMI: "+(w/(h*h)).toFixed(2)

}

function calcAge(){

let b=new Date(document.getElementById("birth").value)

let age=new Date().getFullYear()-b.getFullYear()

document.getElementById("result").innerText=age+" years"

}

function calcTip(){

let bill=parseFloat(document.getElementById("bill").value)

let tip=parseFloat(document.getElementById("tip").value)

document.getElementById("result").innerText="Tip: "+(bill*tip/100)

}

function genUUID(){

document.getElementById("result").innerText=crypto.randomUUID()

}

function convertTemp(){

let c=document.getElementById("celsius").value

document.getElementById("result").innerText=(c*9/5+32)+" °F"

}

function genLorem(){

document.getElementById("result").innerText="Lorem ipsum dolor sit amet, consectetur adipiscing elit."

}

</script>

</body>
</html>
