<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Free Online Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
text-align:center;
}

header{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

#toolbox{
background:white;
color:black;
padding:30px;
margin:20px;
border-radius:10px;
}

input,textarea{
width:80%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
}

canvas{
max-width:100%;
}

</style>

</head>

<body>

<header>

<h1>Free Tools Hub</h1>
<p>PDF • Image • Text Tools</p>

</header>

<div class="grid">

<div class="card" onclick="openTool('merge')">Merge PDF</div>
<div class="card" onclick="openTool('split')">Split PDF</div>
<div class="card" onclick="openTool('imgpdf')">Image → PDF</div>

<div class="card" onclick="openTool('compress')">Image Compressor</div>
<div class="card" onclick="openTool('resize')">Image Resizer</div>

<div class="card" onclick="openTool('word')">Word Counter</div>
<div class="card" onclick="openTool('case')">Case Converter</div>
<div class="card" onclick="openTool('reverse')">Reverse Text</div>

<div class="card" onclick="openTool('password')">Password Generator</div>
<div class="card" onclick="openTool('bmi')">BMI Calculator</div>
<div class="card" onclick="openTool('age')">Age Calculator</div>

</div>

<div id="toolbox"></div>

<script>

function openTool(tool){

let html=""

if(tool=="imgpdf"){

html=`
<h2>Image to PDF</h2>
<input type="file" id="img">
<button onclick="imgToPdf()">Convert</button>
`

}

if(tool=="merge"){

html=`
<h2>Merge PDF</h2>
<input type="file" id="pdfs" multiple>
<button onclick="mergePDF()">Merge</button>
`

}

if(tool=="split"){

html=`
<h2>Split PDF</h2>
<input type="file" id="pdf">
<button onclick="splitPDF()">Split</button>
`

}

if(tool=="compress"){

html=`
<h2>Image Compressor</h2>
<input type="file" id="img">
<label>Quality (0.1-1)</label>
<input id="quality" value="0.6">
<button onclick="compressImage()">Compress</button>
<br><br>
<canvas id="canvas"></canvas>
<button onclick="downloadImage()">Download</button>
`

}

if(tool=="resize"){

html=`
<h2>Image Resizer</h2>
<input type="file" id="img">
<input id="width" placeholder="width">
<input id="height" placeholder="height">
<button onclick="resizeImage()">Resize</button>
<br><br>
<canvas id="canvas"></canvas>
<button onclick="downloadImage()">Download</button>
`

}

if(tool=="word"){

html=`
<textarea id="text"></textarea>
<button onclick="countWords()">Count</button>
<p id="result"></p>
`

}

if(tool=="case"){

html=`
<textarea id="text"></textarea>
<button onclick="upper()">UPPER</button>
<button onclick="lower()">lower</button>
`

}

if(tool=="reverse"){

html=`
<input id="text">
<button onclick="reverseText()">Reverse</button>
<p id="result"></p>
`

}

if(tool=="password"){

html=`
<button onclick="generatePassword()">Generate Password</button>
<p id="result"></p>
`

}

if(tool=="bmi"){

html=`
<input id="weight" placeholder="Weight kg">
<input id="height" placeholder="Height cm">
<button onclick="calcBMI()">Calculate</button>
<p id="result"></p>
`

}

if(tool=="age"){

html=`
<input type="date" id="birth">
<button onclick="calcAge()">Calculate</button>
<p id="result"></p>
`

}

document.getElementById("toolbox").innerHTML=html

}

/* IMAGE → PDF */

async function imgToPdf(){

const file=document.getElementById("img").files[0]
if(!file) return alert("Upload image")

const bytes=await file.arrayBuffer()

const pdfDoc=await PDFLib.PDFDocument.create()

const img=await pdfDoc.embedJpg(bytes)

const page=pdfDoc.addPage([img.width,img.height])

page.drawImage(img,{x:0,y:0,width:img.width,height:img.height})

const pdfBytes=await pdfDoc.save()

download(pdfBytes,"image.pdf")

}

/* MERGE PDF */

async function mergePDF(){

const files=document.getElementById("pdfs").files
if(files.length<2) return alert("Upload at least 2 PDFs")

const merged=await PDFLib.PDFDocument.create()

for(let file of files){

const bytes=await file.arrayBuffer()

const pdf=await PDFLib.PDFDocument.load(bytes)

const pages=await merged.copyPages(pdf,pdf.getPageIndices())

pages.forEach(p=>merged.addPage(p))

}

const bytes=await merged.save()

download(bytes,"merged.pdf")

}

/* SPLIT PDF */

async function splitPDF(){

const file=document.getElementById("pdf").files[0]

const bytes=await file.arrayBuffer()

const pdf=await PDFLib.PDFDocument.load(bytes)

for(let i=0;i<pdf.getPageCount();i++){

const newPdf=await PDFLib.PDFDocument.create()

const [page]=await newPdf.copyPages(pdf,[i])

newPdf.addPage(page)

const bytes=await newPdf.save()

download(bytes,"page"+(i+1)+".pdf")

}

}

/* IMAGE TOOLS */

let canvas

function compressImage(){

const file=document.getElementById("img").files[0]

const quality=document.getElementById("quality").value

const reader=new FileReader()

reader.onload=function(e){

let img=new Image()

img.onload=function(){

canvas=document.getElementById("canvas")

let ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

}

img.src=e.target.result

}

reader.readAsDataURL(file)

}

function resizeImage(){

const file=document.getElementById("img").files[0]

const w=document.getElementById("width").value
const h=document.getElementById("height").value

const reader=new FileReader()

reader.onload=function(e){

let img=new Image()

img.onload=function(){

canvas=document.getElementById("canvas")

let ctx=canvas.getContext("2d")

canvas.width=w
canvas.height=h

ctx.drawImage(img,0,0,w,h)

}

img.src=e.target.result

}

reader.readAsDataURL(file)

}

function downloadImage(){

let link=document.createElement("a")

link.download="image.jpg"

link.href=document.getElementById("canvas").toDataURL("image/jpeg",0.7)

link.click()

}

/* TEXT TOOLS */

function countWords(){

let t=document.getElementById("text").value

document.getElementById("result").innerText=t.split(/\s+/).length+" words"

}

function upper(){

let t=document.getElementById("text")

t.value=t.value.toUpperCase()

}

function lower(){

let t=document.getElementById("text")

t.value=t.value.toLowerCase()

}

function reverseText(){

let t=document.getElementById("text").value

document.getElementById("result").innerText=t.split("").reverse().join("")

}

function generatePassword(){

let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"

let pass=""

for(let i=0;i<12;i++) pass+=chars[Math.floor(Math.random()*chars.length)]

document.getElementById("result").innerText=pass

}

function calcBMI(){

let w=document.getElementById("weight").value

let h=document.getElementById("height").value/100

document.getElementById("result").innerText="BMI: "+(w/(h*h)).toFixed(2)

}

function calcAge(){

let b=new Date(document.getElementById("birth").value)

let age=new Date().getFullYear()-b.getFullYear()

document.getElementById("result").innerText=age+" years"

}

/* DOWNLOAD PDF */

function download(bytes,name){

const blob=new Blob([bytes],{type:"application/pdf"})

const link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download=name

link.click()

}

</script>

</body>
</html>
