<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Free Online Tools Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(270deg,#4facfe,#00f2fe,#667eea,#764ba2);
background-size:800% 800%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

header{
text-align:center;
padding:20px;
color:white;
}

.search{
margin-top:10px;
padding:10px;
width:260px;
border:none;
border-radius:20px;
}

.container{
display:flex;
}

.sidebar{
width:220px;
padding:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
color:white;
}

.sidebar button{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.25);
color:white;
cursor:pointer;
transition:0.3s;
}

.sidebar button:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.45);
}

.main{
flex:1;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.9);
padding:25px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.toolbox{
margin-top:30px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
}

button.action{
background:linear-gradient(45deg,#667eea,#764ba2);
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

button.action:hover{
transform:scale(1.08);
}

.ad{
background:rgba(255,255,255,0.7);
border:2px dashed #bbb;
padding:20px;
margin:20px 0;
text-align:center;
border-radius:10px;
}

.particle{
position:absolute;
background:white;
border-radius:50%;
opacity:0.5;
animation:float 15s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

</style>
</head>

<body>

<header>

<h1>Free Online Tools Hub</h1>

<input class="search" placeholder="Search tools..." onkeyup="searchTool(this.value)">

</header>

<div class="container">

<div class="sidebar">

<h3>Categories</h3>

<button onclick="showCategory('pdf')">PDF Tools</button>
<button onclick="showCategory('image')">Image Tools</button>
<button onclick="showCategory('text')">Text Tools</button>
<button onclick="showCategory('calc')">Calculators</button>

</div>

<div class="main">

<div class="ad">AD SPACE</div>

<div id="toolGrid" class="grid"></div>

<div id="toolbox" class="toolbox">
<h2>Select a tool above</h2>
</div>

<div class="ad">AD SPACE</div>

</div>

</div>

<script>

/* PARTICLES */

for(let i=0;i<30;i++){
let p=document.createElement("div")
p.className="particle"
p.style.width=p.style.height=Math.random()*6+4+"px"
p.style.left=Math.random()*100+"%"
p.style.animationDuration=10+Math.random()*10+"s"
document.body.appendChild(p)
}

/* TOOLS */

const tools={

pdf:[
{title:"Image to PDF",id:"imgpdf"},
{title:"Text to PDF",id:"textpdf"}
],

image:[
{title:"Image Compressor",id:"compress"},
{title:"Image Resizer",id:"resize"}
],

text:[
{title:"Word Counter",id:"word"},
{title:"Case Converter",id:"case"},
{title:"Reverse Text",id:"reverse"}
],

calc:[
{title:"BMI Calculator",id:"bmi"},
{title:"Age Calculator",id:"age"},
{title:"Password Generator",id:"password"}
]

}

/* SHOW CATEGORY */

function showCategory(cat){

let grid=document.getElementById("toolGrid")
grid.innerHTML=""

tools[cat].forEach(t=>{
grid.innerHTML+=`<div class="card" onclick="openTool('${t.id}')"><h3>${t.title}</h3></div>`
})

}

/* SEARCH */

function searchTool(q){

q=q.toLowerCase()

let grid=document.getElementById("toolGrid")
grid.innerHTML=""

Object.values(tools).flat().forEach(t=>{
if(t.title.toLowerCase().includes(q)){
grid.innerHTML+=`<div class="card" onclick="openTool('${t.id}')"><h3>${t.title}</h3></div>`
}
})

}

/* OPEN TOOL */

function openTool(tool){

let html=""

if(tool=="compress"){

html=`
<h2>Image Compressor</h2>

<input type="file" id="compressImg">

<label>Compression Quality</label>

<input type="number" id="quality" value="0.6" step="0.1" min="0.1" max="1">

<button class="action" onclick="compressImage()">Compress</button>

<br><br>

<canvas id="canvas"></canvas>

<br><br>

<button class="action" onclick="downloadCompressed()">Download</button>
`

}

if(tool=="resize"){

html=`
<h2>Image Resizer</h2>

<input type="file" id="resizeImg">

<input type="number" id="width" placeholder="Width">

<input type="number" id="height" placeholder="Height">

<button class="action" onclick="resizeImage()">Resize</button>

<br><br>

<canvas id="resizeCanvas"></canvas>

<br><br>

<button class="action" onclick="downloadResized()">Download</button>
`

}

if(tool=="imgpdf"){

html=`
<h2>Image to PDF</h2>

<input type="file" id="imgfile">

<button class="action" onclick="imageToPDF()">Convert</button>
`

}

if(tool=="textpdf"){

html=`
<h2>Text to PDF</h2>

<textarea id="text"></textarea>

<button class="action" onclick="textToPDF()">Create PDF</button>
`

}

if(tool=="word"){

html=`
<h2>Word Counter</h2>

<textarea id="text"></textarea>

<button class="action" onclick="countWords()">Count</button>

<p id="result"></p>
`

}

if(tool=="case"){

html=`
<h2>Case Converter</h2>

<textarea id="text"></textarea>

<button class="action" onclick="toUpper()">UPPER</button>

<button class="action" onclick="toLower()">lower</button>
`

}

if(tool=="reverse"){

html=`
<h2>Reverse Text</h2>

<input id="text">

<button class="action" onclick="reverseText()">Reverse</button>

<p id="result"></p>
`

}

if(tool=="password"){

html=`
<h2>Password Generator</h2>

<button class="action" onclick="generatePassword()">Generate</button>

<p id="result"></p>
`

}

if(tool=="bmi"){

html=`
<h2>BMI Calculator</h2>

<input id="weight" placeholder="Weight kg">

<input id="height" placeholder="Height cm">

<button class="action" onclick="calcBMI()">Calculate</button>

<p id="result"></p>
`

}

if(tool=="age"){

html=`
<h2>Age Calculator</h2>

<input type="date" id="birth">

<button class="action" onclick="calcAge()">Calculate</button>

<p id="result"></p>
`

}

document.getElementById("toolbox").innerHTML=html

}

/* IMAGE COMPRESSOR */

let compressedCanvas

function compressImage(){

let file=document.getElementById("compressImg").files[0]
let quality=document.getElementById("quality").value

let reader=new FileReader()

reader.onload=function(e){

let img=new Image()

img.onload=function(){

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

compressedCanvas=canvas

}

img.src=e.target.result

}

reader.readAsDataURL(file)

}

function downloadCompressed(){

let quality=document.getElementById("quality").value

let link=document.createElement("a")

link.download="compressed.jpg"

link.href=compressedCanvas.toDataURL("image/jpeg",quality)

link.click()

}

/* IMAGE RESIZER */

let resizedCanvas

function resizeImage(){

let file=document.getElementById("resizeImg").files[0]

let width=document.getElementById("width").value
let height=document.getElementById("height").value

let reader=new FileReader()

reader.onload=function(e){

let img=new Image()

img.onload=function(){

let canvas=document.getElementById("resizeCanvas")
let ctx=canvas.getContext("2d")

canvas.width=width
canvas.height=height

ctx.drawImage(img,0,0,width,height)

resizedCanvas=canvas

}

img.src=e.target.result

}

reader.readAsDataURL(file)

}

function downloadResized(){

let link=document.createElement("a")

link.download="resized.jpg"

link.href=resizedCanvas.toDataURL()

link.click()

}

/* OTHER FUNCTIONS */

function countWords(){
let t=document.getElementById("text").value
document.getElementById("result").innerText=t.split(/\s+/).length+" words"
}

function toUpper(){
let t=document.getElementById("text")
t.value=t.value.toUpperCase()
}

function toLower(){
let t=document.getElementById("text")
t.value=t.value.toLowerCase()
}

function reverseText(){
let t=document.getElementById("text").value
document.getElementById("result").innerText=t.split("").reverse().join("")
}

function generatePassword(){
let c="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"
let p=""
for(let i=0;i<12;i++) p+=c[Math.floor(Math.random()*c.length)]
document.getElementById("result").innerText=p
}

function calcBMI(){
let w=document.getElementById("weight").value
let h=document.getElementById("height").value/100
document.getElementById("result").innerText="BMI: "+(w/(h*h)).toFixed(2)
}

function calcAge(){
let b=new Date(document.getElementById("birth").value)
let age=new Date().getFullYear()-b.getFullYear()
document.getElementById("result").innerText=age+" years"
}

function imageToPDF(){

let file=document.getElementById("imgfile").files[0]

let reader=new FileReader()

reader.onload=function(){
let link=document.createElement("a")
link.href=reader.result
link.download="image.pdf"
link.click()
}

reader.readAsDataURL(file)

}

function textToPDF(){

let text=document.getElementById("text").value

let blob=new Blob([text],{type:"application/pdf"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="text.pdf"

link.click()

}

</script>

</body>
</html>
