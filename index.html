<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Free Tools Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/pdf-lib"></script>

</head>

<body>

<header>

<h1>Free Tools Hub</h1>

<p>PDF • Image • Text Tools</p>

</header>

<div class="grid">

<div class="card" onclick="showTool('merge')">Merge PDF</div>
<div class="card" onclick="showTool('split')">Split PDF</div>
<div class="card" onclick="showTool('imgpdf')">JPG → PDF</div>
<div class="card" onclick="showTool('pdftojpg')">PDF → JPG</div>

<div class="card" onclick="showTool('compress')">Image Compress</div>
<div class="card" onclick="showTool('resize')">Image Resize</div>

<div class="card" onclick="showTool('word')">Word Counter</div>
<div class="card" onclick="showTool('case')">Case Converter</div>
<div class="card" onclick="showTool('reverse')">Reverse Text</div>

<div class="card" onclick="showTool('password')">Password Generator</div>
<div class="card" onclick="showTool('bmi')">BMI Calculator</div>
<div class="card" onclick="showTool('age')">Age Calculator</div>

</div>

<div id="toolbox"></div>

<script src="script.js"></script>

</body>
</html>
